<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Bücherkatalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:inline="javascript">
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans antialiased">
    <div class="absolute inset-0 -z-10">
        <div class="absolute left-0 top-0 h-72 w-72 rounded-full bg-indigo-600/10 blur-3xl"></div>
        <div class="absolute right-0 bottom-1/3 h-72 w-72 rounded-full bg-fuchsia-600/10 blur-3xl"></div>
    </div>
    <header class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
            <div>
                <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-indigo-300/80">Katalog</p>
                <h1 class="text-xl font-bold tracking-tight sm:text-2xl">Bücherkatalog</h1>
                <p class="mt-0.5 text-xs text-slate-400 sm:hidden" th:text="'Hallo, ' + ${reader}">Hallo</p>
            </div>
            <div class="flex items-center gap-3">
                <p class="hidden text-right text-sm text-slate-400 sm:block">
                    <span class="text-slate-500">Eingeloggt als</span><br/>
                    <span class="font-medium text-slate-200" th:text="${reader}">Name</span>
                </p>
                <form th:action="@{/logout}" method="post" class="shrink-0">
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                    <button type="submit"
                            class="rounded-lg border border-slate-600/60 px-3 py-1.5 text-xs font-medium text-slate-300 transition hover:border-rose-500/50 hover:text-rose-200">
                        Abmelden
                    </button>
                </form>
            </div>
        </div>
    </header>
    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
        <div th:if="${ok}" th:text="${ok}" class="mb-4 rounded-lg border border-emerald-500/30 bg-emerald-950/50 px-4 py-2 text-sm text-emerald-200">
        </div>
        <div th:if="${err}" th:text="${err}" class="mb-4 rounded-lg border border-rose-500/30 bg-rose-950/50 px-4 py-2 text-sm text-rose-200">
        </div>
        <p class="mb-6 max-w-2xl text-sm text-slate-400">Leihe dir ein Buch aus &mdash; ausgeliehene Titel sind hervorgehoben, nur der Ausleiher kann es zurückgeben.</p>
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <article
                    th:each="book : ${books}"
                    th:attr="data-borrowed=${!book.available}"
                    class="group relative flex flex-col overflow-hidden rounded-2xl border border-slate-800/80 bg-slate-900/50 shadow-lg transition"
                    th:classappend="${!book.available} ? ' border-amber-900/50 ring-1 ring-amber-500/20' : ' border-slate-800/80'">
                <div class="h-1.5 w-full"
                     th:style="'background:linear-gradient(90deg, #' + ${book.accent} + ' 0%, #0f172a 100%)'"></div>
                <div th:classappend="${!book.available} ? ' opacity-60' : ''" class="flex flex-1 flex-col p-5">
                    <div class="mb-1 flex items-start justify-between gap-2">
                        <h2 class="text-lg font-semibold leading-tight" th:text="${book.title}">Titel</h2>
                        <span
                                th:if="${book.available}"
                                class="shrink-0 rounded-full border border-emerald-500/40 bg-emerald-500/10 px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-emerald-300">
                            Verfügbar
                        </span>
                        <span
                                th:unless="${book.available}"
                                class="shrink-0 rounded-full border border-amber-500/50 bg-amber-500/15 px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-amber-200">
                            Ausgeliehen
                        </span>
                    </div>
                    <p class="text-sm text-slate-400" th:text="${book.author}">Autor</p>
                    <p class="mt-2 text-xs text-slate-500">
                        <span th:text="${book.year}">2020</span>
                    </p>
                    <div th:unless="${book.available}" class="mt-3 rounded-lg border border-amber-500/20 bg-amber-950/30 px-3 py-2 text-xs text-amber-200/90">
                        <span class="text-amber-500/70">An </span>
                        <span class="font-medium" th:text="${book.borrowedBy}">Person</span>
                    </div>
                    <div class="mt-auto flex flex-1 items-end justify-end gap-2 pt-5">
                        <form th:if="${book.available}" th:action="@{/books/{id}/borrow(id=${book.id})}" method="post" class="inline">
                            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                            <button type="submit"
                                    class="rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2 text-sm font-medium text-white shadow shadow-indigo-900/30 transition group-hover:brightness-110">
                                Ausleihen
                            </button>
                        </form>
                        <form
                                th:if="${!book.available and book.borrowedBy != null and #strings.equalsIgnoreCase(book.borrowedBy, reader)}"
                                th:action="@{/books/{id}/return(id=${book.id})}" method="post" class="inline">
                            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                            <button type="submit"
                                    class="rounded-lg border border-slate-500/50 px-4 py-2 text-sm font-medium text-slate-200 transition hover:border-emerald-500/50 hover:text-emerald-200">
                                Zurückgeben
                            </button>
                        </form>
                    </div>
                </div>
            </article>
        </div>
    </main>
</body>
</html>
