<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Bibliothek — Anmeldung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:inline="javascript">
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans antialiased selection:bg-indigo-500/40">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -left-1/3 top-0 h-96 w-96 rounded-full bg-indigo-600/20 blur-3xl"></div>
        <div class="absolute -right-1/3 bottom-0 h-96 w-96 rounded-full bg-violet-600/20 blur-3xl"></div>
    </div>
    <main class="relative z-10 flex min-h-screen items-center justify-center p-6">
        <div class="w-full max-w-md">
            <div class="mb-8 text-center">
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-300/80">Kleine Bibliothek</p>
                <h1 class="mt-2 text-3xl font-bold tracking-tight sm:text-4xl">Willkommen zurück</h1>
                <p class="mt-2 text-sm text-slate-400">Nur dein Name reicht &mdash; kein Passwort, nur Vertrauen.</p>
            </div>
            <div class="rounded-2xl border border-slate-800/80 bg-slate-900/60 p-8 shadow-2xl shadow-indigo-950/40 backdrop-blur">
                <form th:action="@{/login}" method="post" class="space-y-5">
                    <div>
                        <label for="username" class="mb-1.5 block text-sm font-medium text-slate-300">Dein Name</label>
                        <input
                                type="text"
                                id="username"
                                name="username"
                                autocomplete="nickname"
                                required
                                maxlength="64"
                                placeholder="z.B. Lena"
                                class="w-full rounded-xl border border-slate-700/80 bg-slate-950/50 px-4 py-3 text-slate-100 outline-none ring-0 transition placeholder:text-slate-500 focus:border-indigo-500/80 focus:ring-2 focus:ring-indigo-500/30"
                        />
                    </div>
                    <input type="hidden" name="password" value="*"/>
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                    <p th:if="${err}" th:text="${err}" class="text-sm text-rose-400">Fehler</p>
                    <p th:if="${message}" th:text="${message}" class="text-sm text-emerald-400/90">Hinweis</p>
                    <button type="submit"
                            class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-3.5 text-sm font-semibold text-white shadow-lg shadow-indigo-900/30 transition hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                        <span class="relative z-10">Zur Katalog-Übersicht</span>
                    </button>
                </form>
            </div>
            <p class="mt-6 text-center text-xs text-slate-500">Lokal · Demo-Modus</p>
        </div>
    </main>
</body>
</html>
