spring.application.name=secure-api

# In-memory H2 (library shelves)
spring.datasource.url=jdbc:h2:mem:library;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Expose selected Actuator endpoints (restrict further in production)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Disable open-in-view to prevent accidental lazy-loading during view rendering
spring.jpa.open-in-view=false

# Server
server.port=8080
