version: "3.9"

# Named volumes for SonarQube persistence across container restarts.
volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

services:

  # ------------------------------------------------------------------
  # SonarQube — Static Analysis & Code Quality Gate
  # Access the UI at http://localhost:9000
  # Default credentials: admin / admin (change on first login)
  # ------------------------------------------------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ------------------------------------------------------------------
  # API — Spring Boot Application
  # Built from the local Dockerfile using the multi-stage strategy.
  # SonarQube is an analysis tool — the API does not depend on it at
  # runtime, so no depends_on is set here.
  # ------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-api
    ports:
      - "8080:8080"
    healthcheck:
      # eclipse-temurin:21-jre does not include curl; use wget which is available.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure
